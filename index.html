<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Kumar Singh - Interactive Resume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e14, #0d1b2a);
            color: #e6e1cf;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .terminal-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: rgba(13, 17, 23, 0.9);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border: 1px solid #30363d;
            position: relative;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
        }
        
        .terminal-header {
            background: linear-gradient(90deg, #161b22, #0d1117);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }
        
        .terminal-buttons {
            display: flex;
            gap: 8px;
            margin-right: 10px;
        }
        
        .terminal-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .terminal-btn:hover {
            transform: scale(1.1);
        }
        
        .close-btn { background: #ff5f56; }
        .min-btn { background: #ffbd2e; }
        .max-btn { background: #27c93f; }
        
        .terminal-title {
            color: #8b949e;
            font-size: 14px;
            flex-grow: 1;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .terminal-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
        
        .prompt {
            color: #7ee787;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .prompt span {
            color: #ff7b72;
            margin-right: 8px;
        }
        
        .command {
            color: #79c0ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }
        
        .command i {
            margin-right: 10px;
            color: #e6e1cf;
        }
        
        .output {
            padding: 15px 0 15px 25px;
            border-left: 2px solid #30363d;
            margin: 10px 0 20px 15px;
            animation: slideIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .section-title {
            color: #ffa657;
            font-size: 1.4em;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            animation: fadeIn 0.5s;
        }
        
        .section-title i {
            margin-right: 10px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-card {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            animation: fadeIn 0.6s;
            backdrop-filter: blur(5px);
        }
        
        .info-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            background: rgba(22, 27, 34, 0.9);
        }
        
        .card-title {
            color: #58a6ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            font-size: 1.1em;
        }
        
        .card-title i {
            margin-right: 8px;
            color: #7ee787;
        }
        
        .card-content {
            color: #c9d1d9;
            line-height: 1.7;
        }
        
        .card-content ul {
            padding-left: 20px;
        }
        
        .card-content li {
            margin-bottom: 10px;
            position: relative;
        }
        
        .card-content li:before {
            content: "▹";
            color: #58a6ff;
            position: absolute;
            left: -20px;
        }
        
        .tag {
            display: inline-block;
            background: rgba(31, 111, 235, 0.2);
            color: #58a6ff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
            border: 1px solid #58a6ff;
            transition: all 0.2s;
        }
        
        .tag:hover {
            background: rgba(31, 111, 235, 0.4);
            transform: scale(1.05);
        }
        
        .progress-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            height: 12px;
            margin: 12px 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2ea043, #3fb950);
            border-radius: 10px;
        }
        
        .input-area {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }
        
        .input-prompt {
            color: #7ee787;
            margin-right: 10px;
            white-space: nowrap;
        }
        
        .command-input {
            background: transparent;
            border: none;
            color: #e6e1cf;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            width: 100%;
            outline: none;
            caret-color: #58a6ff;
        }
        
        .help-commands {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        
        .command-name {
            color: #ffa657;
        }
        
        .command-desc {
            color: #c9d1d9;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #8b949e;
            font-size: 0.9em;
            padding-top: 15px;
            border-top: 1px solid #30363d;
        }
        
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .contact-links a {
            color: #58a6ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }
        
        .contact-links a:hover {
            color: #7ee787;
            transform: translateY(-3px);
        }
        
        .contact-links a i {
            margin-right: 8px;
        }
        
        .blinking-cursor {
            display: inline-block;
            width: 8px;
            height: 20px;
            background: #58a6ff;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .quantum-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            background: url('https://i.imgur.com/rn2c4Zf.png');
            background-size: cover;
            background-position: center;
        }
        
        .active-section {
            background: rgba(46, 160, 67, 0.1);
            border-left: 3px solid #2ea043;
        }
        
        @media (max-width: 768px) {
            .terminal-body {
                padding: 15px;
            }
            
            .terminal-container {
                height: 95vh;
            }
            
            .section-title {
                font-size: 1.2em;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="quantum-bg"></div>
    
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <div class="terminal-btn close-btn"></div>
                <div class="terminal-btn min-btn"></div>
                <div class="terminal-btn max-btn"></div>
            </div>
            <div class="terminal-title">Abhishek Kumar Singh | Quantum Software Developer</div>
        </div>
        
        <div class="terminal-body" id="terminalOutput">
            <div class="prompt">
                <span>resume@abhishek-krs:~$</span> welcome
            </div>
            <div class="output">
                <div class="command">
                    <i class="fas fa-terminal"></i> Initializing Quantum Developer Resume...
                </div>
                <div class="command">
                    <i class="fas fa-microchip"></i> Loading quantum modules...
                </div>
                <div class="command">
                    <i class="fas fa-brain"></i> Neural network activated...
                </div>
                <div class="command">
                    <i class="fas fa-check-circle"></i> System ready! Type 'help' for commands
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-prompt">resume@abhishek-krs:~$</div>
            <input type="text" class="command-input" id="commandInput" autofocus placeholder="Type command...">
            <div class="blinking-cursor"></div>
        </div>
    </div>

    <script>
        const terminalOutput = document.getElementById('terminalOutput');
        const commandInput = document.getElementById('commandInput');
        
        // Resume data
        const resumeData = {
            personal: {
                name: "Abhishek Kumar Singh",
                title: "Quantum Software Developer",
                phone: "+91902-4457-209",
                email: "abhishek-krs@alumni.iith.ac.in",
                location: "Delhi-NCR, India",
                summary: "Quantum Software Developer specializing in quantum-AI integration and algorithm optimization. Strong background in quantum computing principles with hands-on experience in quantum simulation and quantum machine learning. Seeking research-focused roles in emerging quantum technologies."
            },
            skills: {
                programming: ["C", "C++", "Python", "Java", "JavaScript", "Ruby", "HTML", "CSS", "LaTeX", "MySQL", "Git"],
                quantum: ["Quantum Machine Learning", "Quantum Algorithm Design", "Quantum Simulation", "AI-Quantum Integration", "IBM Quantum Experience", "Qiskit"],
                soft: ["Problem Solving", "Time Management", "Adaptability", "Team Leadership", "Technical Communication"]
            },
            experience: [
                {
                    company: "Tech Mahindra",
                    role: "Trainee Intern",
                    period: "Jul 2024 - Present",
                    location: "Noida, India",
                    description: "Apprenticeship"
                },
                {
                    company: "QWorld",
                    role: "QIntern",
                    period: "Jul 2024 - Aug 2024",
                    location: "Remote (Poland)",
                    description: "Research on 2WQC-quantum integration for error correction analysis"
                },
                {
                    company: "IBM",
                    role: "Quantum Explorer",
                    period: "Jul 2023 - Feb 2024",
                    location: "Remote (Spain)",
                    description: "Unlocked 7 space-exploration achievements ahead of 91.1% participants"
                },
                {
                    company: "Ablution KrS",
                    role: "Explorer",
                    period: "Jan 2022 - May 2023",
                    location: "Remote (India)",
                    description: "Coordinated interdisciplinary missions for COVID research and G20 Summit"
                }
            ],
            education: [
                {
                    institution: "QWorld",
                    degree: "Diploma in Quantum Computing",
                    period: "2023 - May 2024",
                    details: "GPA: 89.17% | Remote (Bosnia)"
                },
                {
                    institution: "Indian Institute of Technology Hyderabad",
                    degree: "B.Tech in Engineering Physics",
                    period: "2017 - Jul 2021",
                    details: "Grade: B | Sangareddy, India"
                }
            ],
            publications: [
                {
                    title: "3-SAT for 2WQC",
                    date: "Oct 2024",
                    details: "arXiv:submit/5938105",
                    contributions: [
                        "Enhanced imperfection models",
                        "C-OR gate optimization",
                        "Large depth simulation"
                    ]
                }
            ],
            projects: [
                {
                    name: "Quantum Heatwave Cooler",
                    event: "Quantum Game Jam",
                    stack: ["JavaScript", "Construct Engine"],
                    description: "Web-based quantum puzzle game where players solve physics-based challenges and puzzles with real-time simulation."
                }
            ],
            certifications: [
                "JavaScript Algorithms - FreeCodeCamp (Mar 2024)",
                "Foundational C# - Microsoft (Feb 2024)",
                "Quantum Computing for Natural Sciences - IBM (Sep 2023)",
                "Twitter for Creatives (Dec 2023)",
                "Learning LinkedIn (Jul 2022)"
            ],
            languages: [
                { language: "Hindi", proficiency: 100 },
                { language: "English", proficiency: 70 },
                { language: "Japanese", proficiency: 30 }
            ]
        };

        // Command functions
        const commands = {
            help: () => {
                return `
                <div class="output">
                    <div class="command">
                        <i class="fas fa-question-circle"></i> Available commands:
                    </div>
                    <div class="help-commands">
                        <div class="command-name">help</div>
                        <div class="command-desc">Show available commands</div>
                        
                        <div class="command-name">clear</div>
                        <div class="command-desc">Clear terminal screen</div>
                        
                        <div class="command-name">about</div>
                        <div class="command-desc">Show personal information</div>
                        
                        <div class="command-name">skills</div>
                        <div class="command-desc">Display technical skills</div>
                        
                        <div class="command-name">experience</div>
                        <div class="command-desc">Show work experience</div>
                        
                        <div class="command-name">education</div>
                        <div class="command-desc">Show education background</div>
                        
                        <div class="command-name">projects</div>
                        <div class="command-desc">Show projects</div>
                        
                        <div class="command-name">publications</div>
                        <div class="command-desc">List publications</div>
                        
                        <div class="command-name">contact</div>
                        <div class="command-desc">Show contact information</div>
                        
                        <div class="command-name">all</div>
                        <div class="command-desc">Display full resume</div>
                    </div>
                </div>
                `;
            },
            
            clear: () => {
                terminalOutput.innerHTML = '';
                return '';
            },
            
            about: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-user"></i> PERSONAL PROFILE
                    </div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-id-card"></i> Contact Information</div>
                            <div class="card-content">
                                <p><strong>Name:</strong> ${resumeData.personal.name}</p>
                                <p><strong>Title:</strong> ${resumeData.personal.title}</p>
                                <p><strong>Phone:</strong> ${resumeData.personal.phone}</p>
                                <p><strong>Email:</strong> ${resumeData.personal.email}</p>
                                <p><strong>Location:</strong> ${resumeData.personal.location}</p>
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-laptop-code"></i> Professional Summary</div>
                            <div class="card-content">
                                <p>${resumeData.personal.summary}</p>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            },
            
            skills: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-brain"></i> SKILLS & COMPETENCIES
                    </div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-cogs"></i> Programming Languages</div>
                            <div class="card-content">
                                ${resumeData.skills.programming.map(skill => `<span class="tag">${skill}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-atom"></i> Quantum Technologies</div>
                            <div class="card-content">
                                ${resumeData.skills.quantum.map(skill => `<span class="tag">${skill}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-people-arrows"></i> Soft Skills</div>
                            <div class="card-content">
                                ${resumeData.skills.soft.map(skill => `<span class="tag">${skill}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-language"></i> Languages</div>
                            <div class="card-content">
                                ${resumeData.languages.map(lang => `
                                    <p><strong>${lang.language}:</strong> ${lang.proficiency}%</p>
                                    <div class="progress-container">
                                        <div class="progress-bar" style="width: ${lang.proficiency}%"></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            },
            
            experience: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-briefcase"></i> PROFESSIONAL EXPERIENCE
                    </div>
                    <div class="info-grid">
                        ${resumeData.experience.map(exp => `
                            <div class="info-card">
                                <div class="card-title"><i class="fas fa-building"></i> ${exp.company}</div>
                                <div class="card-content">
                                    <p><strong>Position:</strong> ${exp.role}</p>
                                    <p><strong>Duration:</strong> ${exp.period}</p>
                                    <p><strong>Location:</strong> ${exp.location}</p>
                                    <p>${exp.description}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            },
            
            education: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-graduation-cap"></i> EDUCATION
                    </div>
                    <div class="info-grid">
                        ${resumeData.education.map(edu => `
                            <div class="info-card">
                                <div class="card-title"><i class="fas fa-university"></i> ${edu.institution}</div>
                                <div class="card-content">
                                    <p><strong>Degree:</strong> ${edu.degree}</p>
                                    <p><strong>Duration:</strong> ${edu.period}</p>
                                    <p><strong>Details:</strong> ${edu.details}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            },
            
            projects: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-project-diagram"></i> PROJECTS & ACHIEVEMENTS
                    </div>
                    <div class="info-grid">
                        ${resumeData.projects.map(proj => `
                            <div class="info-card">
                                <div class="card-title"><i class="fas fa-gamepad"></i> ${proj.name}</div>
                                <div class="card-content">
                                    <p><strong>Event:</strong> ${proj.event}</p>
                                    <p><strong>Stack:</strong> ${proj.stack.join(', ')}</p>
                                    <p><strong>Description:</strong> ${proj.description}</p>
                                </div>
                            </div>
                        `).join('')}
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-award"></i> Certifications</div>
                            <div class="card-content">
                                <ul>
                                    ${resumeData.certifications.map(cert => `<li>${cert}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            },
            
            publications: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-file-alt"></i> RESEARCH & PUBLICATIONS
                    </div>
                    <div class="info-grid">
                        ${resumeData.publications.map(pub => `
                            <div class="info-card">
                                <div class="card-title"><i class="fas fa-book"></i> ${pub.title}</div>
                                <div class="card-content">
                                    <p><strong>Date:</strong> ${pub.date}</p>
                                    <p><strong>Publication:</strong> ${pub.details}</p>
                                    <p><strong>Contributions:</strong></p>
                                    <ul>
                                        ${pub.contributions.map(cont => `<li>${cont}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            },
            
            contact: () => {
                return `
                <div class="output">
                    <div class="section-title">
                        <i class="fas fa-id-badge"></i> CONTACT INFORMATION
                    </div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-envelope"></i> Email</div>
                            <div class="card-content">
                                <p>${resumeData.personal.email}</p>
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-phone"></i> Phone</div>
                            <div class="card-content">
                                <p>${resumeData.personal.phone}</p>
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-map-marker-alt"></i> Location</div>
                            <div class="card-content">
                                <p>${resumeData.personal.location}</p>
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <div class="card-title"><i class="fas fa-link"></i> Online Profiles</div>
                            <div class="card-content">
                                <ul>
                                    <li><a href="https://linkedin.com/in/abhishek-krs" target="_blank">LinkedIn</a></li>
                                    <li><a href="https://abhishek-krs.github.io" target="_blank">GitHub Portfolio</a></li>
                                    <li><a href="https://arxiv.org" target="_blank">arXiv Publications</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            },
            
            all: () => {
                return commands.about() + 
                       commands.skills() + 
                       commands.experience() + 
                       commands.education() + 
                       commands.publications() + 
                       commands.projects() + 
                       `<div class="footer">
                            <p>Resume created: July 2025 | Terminal Resume v1.0</p>
                            <div class="contact-links">
                                <a href="https://linkedin.com/in/abhishek-krs" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
                                <a href="https://abhishek-krs.github.io" target="_blank"><i class="fab fa-github"></i> GitHub</a>
                                <a href="mailto:abhishek-krs@alumni.iith.ac.in"><i class="fas fa-envelope"></i> Email</a>
                            </div>
                        </div>`;
            }
        };

        // Handle command input
        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = commandInput.value.trim().toLowerCase();
                commandInput.value = '';
                
                // Add the command to terminal
                const prompt = document.createElement('div');
                prompt.className = 'prompt';
                prompt.innerHTML = `<span>resume@abhishek-krs:~$</span> ${command}`;
                terminalOutput.appendChild(prompt);
                
                // Process the command
                if (commands[command]) {
                    const output = commands[command]();
                    if (output) {
                        const outputDiv = document.createElement('div');
                        outputDiv.innerHTML = output;
                        terminalOutput.appendChild(outputDiv);
                    }
                } else if (command) {
                    const error = document.createElement('div');
                    error.className = 'output';
                    error.innerHTML = `<div class="command"><i class="fas fa-exclamation-triangle"></i> Command not found: ${command}. Type 'help' for available commands.</div>`;
                    terminalOutput.appendChild(error);
                }
                
                // Scroll to bottom
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
            }
        });

        // Initial help display
        setTimeout(() => {
            terminalOutput.innerHTML += commands.help();
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }, 1000);
    </script>
</body>
</html>
